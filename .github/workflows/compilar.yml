name: Build-Final-APK
on: [push, pull_request]

jobs:
  build_job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        uses: GearScrewdriver/buildozer-action@v1
        with:
          buildozer_version: master
          python_version: 3.11
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: MiAppKivy
          path: bin/*.apk
          
          
